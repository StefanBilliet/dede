name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: src/DogEatDog.DependencyExplorer.WebUi/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/DogEatDog.DependencyExplorer.WebUi/client
        run: npm ci

      - name: Frontend lint
        working-directory: src/DogEatDog.DependencyExplorer.WebUi/client
        run: npm run lint

      - name: Frontend tests
        working-directory: src/DogEatDog.DependencyExplorer.WebUi/client
        run: npm run test:run

      - name: Frontend build
        working-directory: src/DogEatDog.DependencyExplorer.WebUi/client
        run: npm run build

      - name: Restore
        run: dotnet restore DogEatDog.DependencyExplorer.sln

      - name: Build
        run: dotnet build DogEatDog.DependencyExplorer.sln --configuration Release --no-restore

      - name: Test unit tests
        run: dotnet test tests/DogEatDog.DependencyExplorer.UnitTests/DogEatDog.DependencyExplorer.UnitTests.csproj --configuration Release --no-build

      - name: Test integration tests
        run: dotnet test tests/DogEatDog.DependencyExplorer.IntegrationTests/DogEatDog.DependencyExplorer.IntegrationTests.csproj --configuration Release --no-build
